apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: message-service
  namespace: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: message-service
  namespaceSelector:
    matchNames:
      - message-service
  endpoints:
    - port: http
      path: /metrics
      interval: 15s

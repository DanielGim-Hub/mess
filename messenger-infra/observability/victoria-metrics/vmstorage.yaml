apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vmstorage
  namespace: observability
  labels:
    app: vmstorage
spec:
  serviceName: vmstorage
  replicas: 2
  selector:
    matchLabels:
      app: vmstorage
  template:
    metadata:
      labels:
        app: vmstorage
    spec:
      containers:
        - name: vmstorage
          image: victoriametrics/vmstorage:v1.102.0-cluster
          ports:
            - containerPort: 8482
              name: http
            - containerPort: 8400
              name: vminsert
            - containerPort: 8401
              name: vmselect
          args:
            - "--storageDataPath=/storage"
          volumeMounts:
            - name: storage
              mountPath: /storage
          resources:
            limits:
              memory: 2Gi
              cpu: 1000m
            requests:
              memory: 512Mi
              cpu: 250m
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vmstorage
  namespace: observability
spec:
  selector:
    app: vmstorage
  ports:
    - port: 8482
      name: http
    - port: 8400
      name: vminsert
    - port: 8401
      name: vmselect
  clusterIP: None

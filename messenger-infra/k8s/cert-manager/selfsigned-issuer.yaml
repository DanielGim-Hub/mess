apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: messenger-tls
  namespace: istio-system
spec:
  secretName: messenger-tls-secret
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - "*.local"
    - messenger.local
    - api.messenger.local
  usages:
    - server auth
    - client auth

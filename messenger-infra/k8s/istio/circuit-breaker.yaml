# Circuit Breaker + Outlier Detection для realtime-gateway -> message-service
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: message-service-cb
  namespace: message-service
spec:
  host: message-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
# Retry policy для chat-service -> message-service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: chat-to-message-retry
  namespace: chat-service
spec:
  hosts:
    - message-service.message-service.svc.cluster.local
  http:
    - route:
        - destination:
            host: message-service.message-service.svc.cluster.local
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: gateway-error,connect-failure,refused-stream
      timeout: 20s

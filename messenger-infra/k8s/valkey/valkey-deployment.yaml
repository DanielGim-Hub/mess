apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: redis
  labels:
    app: valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:7.2-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 128Mi
              cpu: 100m
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: redis
spec:
  selector:
    app: valkey
  ports:
    - port: 6379
      targetPort: 6379
      name: redis

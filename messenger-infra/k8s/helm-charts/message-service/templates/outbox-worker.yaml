{{- if .Values.outboxWorker.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "message-service.fullname" . }}-outbox
  labels:
    {{- include "message-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: outbox-worker
spec:
  serviceName: {{ include "message-service.fullname" . }}-outbox
  replicas: {{ .Values.outboxWorker.replicaCount }}
  selector:
    matchLabels:
      {{- include "message-service.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: outbox-worker
  template:
    metadata:
      labels:
        {{- include "message-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: outbox-worker
    spec:
      serviceAccountName: {{ include "message-service.serviceAccountName" . }}
      containers:
        - name: outbox-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "manage.py", "run_outbox_worker"]
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.outboxWorker.resources | nindent 12 }}
{{- end }}

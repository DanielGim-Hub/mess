{{- if .Values.archiveJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "message-service.fullname" . }}-archive
  labels:
    {{- include "message-service.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.archiveJob.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "message-service.serviceAccountName" . }}
          containers:
            - name: archive
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["python", "manage.py", "archive_old_messages"]
              env:
                {{- range $key, $value := .Values.env }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
              resources:
                {{- toYaml .Values.archiveJob.resources | nindent 16 }}
{{- end }}

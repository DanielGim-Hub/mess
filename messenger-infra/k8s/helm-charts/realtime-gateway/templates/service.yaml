apiVersion: v1
kind: Service
metadata:
  name: {{ include "realtime-gateway.fullname" . }}
  labels:
    {{- include "realtime-gateway.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: ws
  selector:
    {{- include "realtime-gateway.selectorLabels" . | nindent 4 }}

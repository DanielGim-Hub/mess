{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "realtime-gateway.fullname" . }}
  labels:
    {{- include "realtime-gateway.labels" . | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "realtime-gateway.selectorLabels" . | nindent 6 }}
{{- end }}

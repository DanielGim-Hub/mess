apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: messenger-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/DanielGim-Hub/chatService.git
    targetRevision: main
    path: messenger-infra/k8s/argo-apps/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

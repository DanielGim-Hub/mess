# Примечание: в production использовать External Secrets Operator + Vault.
# Для локальной среды — базовые secrets (необходимо закодировать значения в base64).

apiVersion: v1
kind: Secret
metadata:
  name: chat-service-db
  namespace: chat-service
type: Opaque
stringData:
  DATABASE_URL: "postgres://chat_user:chat_pass@chat-service-postgresql:5432/chat_db?sslmode=disable"
---
apiVersion: v1
kind: Secret
metadata:
  name: message-service-db
  namespace: message-service
type: Opaque
stringData:
  DATABASE_URL: "postgres://message_user:message_pass@message-service-postgresql:5432/message_db?sslmode=disable"
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-sasl
  namespace: kafka
type: Opaque
stringData:
  username: "messenger"
  password: "messenger-secret"
